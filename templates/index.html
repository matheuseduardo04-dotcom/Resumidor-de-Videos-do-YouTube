<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matheus Dev IA</title>
  <meta name="description" content="Converse com o Matheus Dev IA — assistente inteligente powered by Claude da Anthropic." />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div class="app" id="app">
  <!-- Overlay mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">
          <img src="/static/icon.svg" alt="Ícone" style="width:34px;height:34px;border-radius:9px;display:block;object-fit:cover;" />
        </div>
        <div class="brand-name">
          Matheus Dev IA
          <span class="brand-tag">Powered by Claude</span>
        </div>
      </div>
      <button class="new-chat-btn" id="newChatBtn">+ Nova conversa</button>
    </div>

    <div class="sidebar-body">
      <p class="sidebar-section-label">Sugestões</p>
      <button class="suggestion-btn" data-text="Me explique como funciona uma API REST com exemplos práticos.">
        <strong style="display:block;margin-bottom:2px;color:var(--accent);font-size:0.7rem;">Programação</strong>
        Me explique como funciona uma API REST com exemplos práticos.
      </button>
      <button class="suggestion-btn" data-text="Crie um slogan impactante para uma startup de tecnologia.">
        <strong style="display:block;margin-bottom:2px;color:var(--accent);font-size:0.7rem;">Criatividade</strong>
        Crie um slogan impactante para uma startup de tecnologia.
      </button>
      <button class="suggestion-btn" data-text="Quais são as melhores técnicas para melhorar o foco no trabalho?">
        <strong style="display:block;margin-bottom:2px;color:var(--accent);font-size:0.7rem;">Produtividade</strong>
        Quais são as melhores técnicas para melhorar o foco no trabalho?
      </button>
      <button class="suggestion-btn" data-text="Quais são as tendências de IA para 2025 e 2026?">
        <strong style="display:block;margin-bottom:2px;color:var(--accent);font-size:0.7rem;">Análise</strong>
        Quais são as tendências de IA para 2025 e 2026?
      </button>
    </div>

    <div class="sidebar-footer">
      <span class="footer-info">Matheus Dev IA<br />v1.0 · Claude</span>
      <button class="icon-btn" id="themeBtn" title="Alternar tema">☀️</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="chat-main">
    <!-- Topbar mobile -->
    <div class="mobile-topbar">
      <button class="icon-btn" id="menuBtn" title="Menu">☰</button>
      <span class="topbar-title">Matheus Dev IA</span>
      <button class="icon-btn" id="themeBtn2" title="Tema">☀️</button>
    </div>

    <!-- Messages -->
    <div class="messages-area" id="messagesArea">
      <div class="messages-inner" id="messagesInner">
        <!-- Welcome -->
        <div class="welcome" id="welcome">
          <div class="welcome-logo">
            <img src="/static/icon.svg" alt="Ícone" width="56" height="56" style="border-radius:16px;display:block;" />
          </div>
          <h1>Olá, no que posso ajudar?</h1>
          <div class="welcome-chips">
            <button class="chip-btn" data-text="Me explique como funciona uma API REST com exemplos práticos.">Programação</button>
            <button class="chip-btn" data-text="Crie um slogan impactante para uma startup de tecnologia.">Criatividade</button>
            <button class="chip-btn" data-text="Quais são as melhores técnicas para melhorar o foco no trabalho?">Produtividade</button>
            <button class="chip-btn" data-text="Quais são as tendências de IA para 2025 e 2026?">Análise</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Composer -->
    <div class="composer-wrap">
      <!-- Preview da imagem selecionada -->
      <div class="image-preview-wrap" id="imagePreviewWrap">
        <div class="image-preview-inner">
          <img id="imagePreviewThumb" src="" alt="preview" />
          <button type="button" class="remove-image-btn" id="removeImageBtn" title="Remover">×</button>
        </div>
      </div>

      <form class="composer" id="chatForm">
        <input type="file" id="imageInput" accept="image/png,image/jpeg,image/webp,image/gif" style="display:none" />
        <button type="button" class="attach-btn" id="attachBtn" title="Enviar imagem">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
        <textarea
          id="chatInput"
          placeholder="Pergunte qualquer coisa..."
          rows="1"
        ></textarea>
        <div class="composer-right">
          <button class="send-btn" id="sendBtn" type="submit" disabled title="Enviar">↑</button>
        </div>
      </form>
      <div class="composer-hint-wrap">
        <span class="composer-hint" id="composerHint"></span>
      </div>
    </div>
  </main>
</div>

<script>
  const DAILY_LIMIT = parseInt("{{ daily_limit }}");

  // ── Usage ──
  function getUsage() {
    try {
      const raw = localStorage.getItem("mdai-usage");
      const today = new Date().toISOString().slice(0, 10);
      if (!raw) return { date: today, count: 0 };
      const parsed = JSON.parse(raw);
      if (parsed.date !== today) return { date: today, count: 0 };
      return parsed;
    } catch {
      return { date: new Date().toISOString().slice(0, 10), count: 0 };
    }
  }

  function saveUsage(u) { localStorage.setItem("mdai-usage", JSON.stringify(u)); }

  // ── State ──
  let messages = [];
  let loading = false;
  let usage = getUsage();

  // ── Elements ──
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");
  const newChatBtn = document.getElementById("newChatBtn");
  const menuBtn = document.getElementById("menuBtn");
  const themeBtn = document.getElementById("themeBtn");
  const themeBtn2 = document.getElementById("themeBtn2");
  const chatForm = document.getElementById("chatForm");
  const chatInput = document.getElementById("chatInput");
  const sendBtn = document.getElementById("sendBtn");
  const messagesInner = document.getElementById("messagesInner");
  const welcome = document.getElementById("welcome");
  const composerHint = document.getElementById("composerHint");
  const messagesArea = document.getElementById("messagesArea");

  // ── Theme ──
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    const icon = theme === "dark" ? "☀️" : "🌙";
    themeBtn.textContent = icon;
    themeBtn2.textContent = icon;
    localStorage.setItem("mdai-theme", theme);
  }

  function toggleTheme() {
    const cur = document.documentElement.dataset.theme || "dark";
    applyTheme(cur === "dark" ? "light" : "dark");
  }

  applyTheme(localStorage.getItem("mdai-theme") || "dark");
  themeBtn.addEventListener("click", toggleTheme);
  themeBtn2.addEventListener("click", toggleTheme);

  // ── Sidebar ──
  menuBtn.addEventListener("click", () => {
    sidebar.classList.add("open");
    overlay.classList.add("visible");
  });

  function closeSidebar() {
    sidebar.classList.remove("open");
    overlay.classList.remove("visible");
  }

  overlay.addEventListener("click", closeSidebar);

  newChatBtn.addEventListener("click", () => {
    messages = [];
    renderMessages();
    chatInput.value = "";
    autoResize();
    updateSendBtn();
    closeSidebar();
  });

  // ── Suggestions ──
  document.querySelectorAll("[data-text]").forEach((btn) => {
    btn.addEventListener("click", () => {
      chatInput.value = btn.dataset.text;
      autoResize();
      updateSendBtn();
      chatInput.focus();
      closeSidebar();
    });
  });

  // ── Textarea ──
  function autoResize() {
    chatInput.style.height = "auto";
    chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + "px";
  }

  chatInput.addEventListener("input", () => { autoResize(); updateSendBtn(); });
  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  chatForm.addEventListener("submit", (e) => {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  });

  // ── Hint ──
  function updateHint() {
    const remaining = DAILY_LIMIT - usage.count;
    composerHint.textContent = remaining <= 0
      ? "Limite diário atingido — volte amanhã"
      : `${remaining} mensagens restantes hoje`;
  }

  function updateSendBtn() {
    const hasContent = chatInput.value.trim() || pendingImage;
    sendBtn.disabled = !hasContent || loading || usage.count >= DAILY_LIMIT;
  }

  // ── Render ──
  function renderMessages() {
    document.querySelectorAll(".msg-group").forEach((el) => el.remove());
    if (messages.length === 0) { welcome.style.display = ""; return; }
    welcome.style.display = "none";
    messages.forEach(appendMessageToDOM);
    scrollToBottom();
  }

  const CLAUDE_AVATAR = `<img src="/static/icon.svg" alt="IA" width="30" height="30" style="border-radius:50%;display:block;object-fit:cover;" />`;

  function appendMessageToDOM(msg) {
    const group = document.createElement("div");
    group.className = "msg-group";

    const row = document.createElement("div");
    row.className = `msg-row${msg.role === "user" ? " user" : ""}`;

    if (msg.role !== "user") {
      const avatar = document.createElement("div");
      avatar.className = "avatar ai";
      avatar.innerHTML = CLAUDE_AVATAR;
      row.appendChild(avatar);
    }

    const bubble = document.createElement("div");
    bubble.className = `bubble ${msg.role === "user" ? "user" : "ai"}${msg.isError ? " error" : ""}`;

    if (msg.displayImage) {
      const img = document.createElement("img");
      img.src = msg.displayImage;
      img.className = "chat-image";
      img.alt = "imagem enviada";
      bubble.appendChild(img);
    }

    if (msg.displayText || typeof msg.content === "string") {
      const text = document.createElement("span");
      text.textContent = msg.displayText || msg.content;
      if (msg.displayImage && msg.displayText) text.style.display = "block";
      bubble.appendChild(text);
    }

    row.appendChild(bubble);
    group.appendChild(row);
    messagesInner.appendChild(group);
  }

  function showThinking() {
    const group = document.createElement("div");
    group.className = "msg-group";
    group.id = "thinkingGroup";

    const row = document.createElement("div");
    row.className = "msg-row";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai";
    avatar.innerHTML = CLAUDE_AVATAR;

    const bubble = document.createElement("div");
    bubble.className = "bubble ai";
    bubble.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';

    row.appendChild(avatar);
    row.appendChild(bubble);
    group.appendChild(row);
    messagesInner.appendChild(group);
    scrollToBottom();
  }

  function removeThinking() {
    const el = document.getElementById("thinkingGroup");
    if (el) el.remove();
  }

  function scrollToBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }

  // ── Send ──
  async function sendMessage() {
    const trimmed = chatInput.value.trim();
    if (!trimmed || loading) return;

    const currentUsage = getUsage();
    if (currentUsage.count >= DAILY_LIMIT) {
      messages.push({ role: "assistant", content: `Você atingiu o limite de ${DAILY_LIMIT} mensagens por dia. Volte amanhã!`, isError: true });
      renderMessages();
      return;
    }

    // Monta conteúdo com ou sem imagem
    let apiContent;
    let displayImage = null;

    if (pendingImage) {
      apiContent = [];
      apiContent.push({ type: "image", source: { type: "base64", media_type: pendingImage.mediaType, data: pendingImage.base64 } });
      if (trimmed) apiContent.push({ type: "text", text: trimmed });
      displayImage = pendingImage.dataUrl;
    } else {
      apiContent = trimmed;
    }

    const userMsg = { role: "user", content: apiContent, displayImage, displayText: trimmed };
    messages.push(userMsg);
    welcome.style.display = "none";
    appendMessageToDOM(userMsg);

    chatInput.value = "";
    chatInput.style.height = "auto";
    pendingImage = null;
    imagePreviewThumb.src = "";
    imagePreviewWrap.style.display = "none";
    loading = true;
    updateSendBtn();

    usage = { date: currentUsage.date, count: currentUsage.count + 1 };
    saveUsage(usage);
    updateHint();
    showThinking();

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages }),
      });

      const data = await res.json();
      removeThinking();

      const aiMsg = {
        role: "assistant",
        content: data.error || data.output || "Sem resposta.",
        isError: !res.ok || !!data.error,
      };
      messages.push(aiMsg);
      appendMessageToDOM(aiMsg);
      scrollToBottom();
    } catch {
      removeThinking();
      const errMsg = { role: "assistant", content: "Falha na conexão. Verifique sua internet e tente novamente.", isError: true };
      messages.push(errMsg);
      appendMessageToDOM(errMsg);
      scrollToBottom();
    } finally {
      loading = false;
      updateSendBtn();
    }
  }

  // ── Image upload ──
  const imageInput = document.getElementById("imageInput");
  const attachBtn = document.getElementById("attachBtn");
  const imagePreviewWrap = document.getElementById("imagePreviewWrap");
  const imagePreviewThumb = document.getElementById("imagePreviewThumb");
  const removeImageBtn = document.getElementById("removeImageBtn");

  let pendingImage = null; // { dataUrl, base64, mediaType }

  attachBtn.addEventListener("click", () => imageInput.click());

  imageInput.addEventListener("change", () => {
    const file = imageInput.files[0];
    if (!file) return;

    if (file.size > 5 * 1024 * 1024) {
      alert("Imagem muito grande. Use uma imagem menor que 5MB.");
      imageInput.value = "";
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(",")[1];
      pendingImage = { dataUrl, base64, mediaType: file.type };
      imagePreviewThumb.src = dataUrl;
      imagePreviewWrap.style.display = "flex";
      updateSendBtn();
    };
    reader.readAsDataURL(file);
    imageInput.value = "";
  });

  removeImageBtn.addEventListener("click", () => {
    pendingImage = null;
    imagePreviewThumb.src = "";
    imagePreviewWrap.style.display = "none";
    updateSendBtn();
  });

  // ── Init ──
  updateHint();
  updateSendBtn();
</script>
</body>
</html>
